<section class="auth-card card-glass auth-card-wide">
  <div class="auth-copy">
    <span class="eyebrow">FullBicho</span>
    <h1>Criar conta</h1>
    <p>Ganhe R$1000,00 de saldo se finalizar o cadastro agora mesmo!</p>
  </div>

  <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <label class="form-label">Nome completo</label>
    <input class="form-control" formControlName="username" placeholder="Seu nome">
    <small class="field-error" *ngIf="form.controls.username.touched && form.controls.username.invalid">Nome inválido. Mínimo 3 caracteres.</small>


    <label class="form-label mt-3">E-mail</label>
    <input class="form-control" type="email" formControlName="email" placeholder="voce@email.com">
    <small class="field-error" *ngIf="form.controls.email.touched && form.controls.email.invalid">E-mail inválido.</small>


    <label class="form-label mt-3">CPF</label>
    <input class="form-control" formControlName="cpf" placeholder="Insira um CPF fictício">
    <small class="field-error" *ngIf="form.controls.cpf.touched && form.controls.cpf.invalid">CPF inválido.</small>


    <div class="row g-3 mt-1">
      <div class="col-md-6">
        <label class="form-label">Senha</label>
        <input class="form-control" type="password" formControlName="password">
        <small class="field-error" *ngIf="form.controls.password.touched && form.controls.password.invalid">Mínimo 4 caracteres.</small>

      </div>
      <div class="col-md-6">
        <label class="form-label">Confirmar senha</label>
        <input class="form-control" type="password" formControlName="confirmPassword">
        <small class="field-error" *ngIf="form.controls.confirmPassword.touched && form.controls.confirmPassword.invalid">Confirmação obrigatória.</small>

      </div>
    </div>

    <button class="btn btn-primary w-100 mt-4" type="submit" [disabled]="loading">
      {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
    </button>

    <p class="auth-link">Já tem conta? <a routerLink="/login">Login</a></p>
  </form>
</section>
