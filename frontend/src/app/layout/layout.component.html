<nav class="app-navbar">
  <a class="brand" routerLink="/dashboard">
    <span class="brand-mark">FB</span>
    <span>Full Bicho</span>
  </a>

  <div class="nav-links">
    <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
    <a routerLink="/history" routerLinkActive="active">Histórico</a>
    <a routerLink="/profile" routerLinkActive="active">Perfil</a>
    <a *ngIf="(user$ | async)?.role === 'ADMIN'" routerLink="/admin" routerLinkActive="active">Admin</a>
  </div>

  <div class="nav-user" *ngIf="user$ | async as user">
    <div>
      <strong>{{ user.username }}</strong>
      <small>{{ user.balance | currency:'BRL':'symbol':'1.2-2' }}</small>
    </div>
    <button class="btn btn-sm btn-outline-light" type="button" (click)="logout()">Sair</button>
  </div>
</nav>
